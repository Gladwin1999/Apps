<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="calculator-window">
        <div class="window-controls">
            <span class="control red"></span>
            <span class="control yellow"></span>
            <span class="control green"></span>
        </div>
        <div id="display" class="display"></div>
        <div class="buttons-grid">
            <button data-action="ac" class="light-gray">AC</button>
            <button data-action="plus-minus" class="light-gray">+/-</button>
            <button data-action="percent" class="light-gray">%</button>
            <button data-operator="/" class="orange">÷</button>
            
            <button data-digit="7">7</button>
            <button data-digit="8">8</button>
            <button data-digit="9">9</button>
            <button data-operator="*" class="orange">×</button>
            
            <button data-digit="4">4</button>
            <button data-digit="5">5</button>
            <button data-digit="6">6</button>
            <button data-operator="-" class="orange">−</button>
            
            <button data-digit="1">1</button>
            <button data-digit="2">2</button>
            <button data-digit="3">3</button>
            <button data-operator="+" class="orange">+</button>
            
            <button data-action="decimal" class="dark-gray">.</button>
            <button data-digit="0">0</button>
            <button data-action="delete">⌫</button>
            <button data-action="equals" class="orange">=</button>
        </div>
    </div>
    <script src="calculator.js"></script>
</body>
</html>
